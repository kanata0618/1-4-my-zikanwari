<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1-4 my zikanwari</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --accent: #0ea5e9;
            --task-border: #f59e0b;
            --success: #16a34a;
            --danger: #dc2626;
            --warning: #f59e0b;
            --text-main: #ffffff;
            --text-muted: #cbd5e1;
        }

        /* パスワード認証前は非表示にする設定 */
        body { 
            display: none; 
            margin: 0; 
            padding: 20px; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background: var(--bg-main); 
            color: var(--text-main); 
            line-height: 1.6; 
        }

        .top-box { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .date-section { min-width: 200px; }
        #todayBox { font-size: 28px; font-weight: 800; margin-bottom: 10px; }
        
        .link-group { display: flex; flex-direction: column; gap: 6px; }
        .ext-link { color: var(--text-muted); text-decoration: none; font-size: 13px; background: var(--bg-card); padding: 5px 12px; border-radius: 6px; border: 1px solid #334155; transition: 0.2s; width: fit-content; }
        .ext-link:hover { background: var(--bg-hover); color: var(--accent); border-color: var(--accent); }

        .deadline-area { display: flex; gap: 15px; flex-wrap: wrap; flex: 1; justify-content: flex-end; }
        .deadline { background: var(--bg-card); padding: 15px; border-radius: 15px; width: 260px; border: 1px solid #334155; cursor: pointer; transition: 0.2s; }
        .deadline:hover { border-color: var(--accent); background: var(--bg-hover); }
        .deadline h3 { margin: 0 0 10px; font-size: 14px; color: var(--text-muted); border-bottom: 1px solid #334155; padding-bottom: 5px; }
        #quickMemoInput { background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; padding: 8px; height: 80px; width: 100%; resize: none; box-sizing: border-box; outline: none; }

        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 10px; table-layout: fixed; min-width: 900px; }
        th { color: var(--text-muted); padding-bottom: 10px; }
        .date-label { display: block; font-size: 12px; opacity: 0.8; }
        .day-label { display: block; font-size: 18px; font-weight: bold; }
        th.today-highlight { color: var(--accent); }
        .period { width: 90px; height: 90px; background: var(--bg-card); border-radius: 18px; text-align: center; vertical-align: middle; color: #94a3b8; }
        td:not(.period) { background: var(--bg-card); border-radius: 18px; text-align: center; padding: 10px; height: 90px; cursor: pointer; transition: 0.3s; border: 2px solid transparent; }
        .has-task { border: 2px dashed var(--task-border) !important; }
        .today-class { border: 2px solid var(--accent) !important; }
        td:hover:not(.blank):not(.period) { background: var(--bg-hover); transform: translateY(-3px); }
        .blank { background: transparent !important; }

        .popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 1000; }
        .popup-content { background: #111827; width: 900px; max-width: 95%; max-height: 90vh; overflow-y: auto; border-radius: 25px; padding: 40px; position: relative; border: 1px solid #334155; }
        .close { position: absolute; top: 20px; right: 25px; font-size: 30px; cursor: pointer; color: var(--text-muted); }

        .card { background: var(--bg-hover); border-radius: 12px; padding: 15px; margin-top: 10px; border-left: 4px solid var(--accent); cursor: pointer; border: 1px solid transparent; }
        .card:hover { border-color: var(--accent); }
        .card.test-card { border-left-color: var(--warning); }
        
        .completed-section { margin-top: 40px; border-top: 1px solid #334155; padding-top: 20px; }
        .completed-card { background: #0f172a; padding: 10px 15px; border-radius: 10px; margin-bottom: 8px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #1e293b; }
        .completed-card .title { text-decoration: line-through; color: var(--text-muted); }
        .btn-undo { background: #64748b; color: white; border: none; padding: 6px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }

        .input-box { flex: 1; min-width: 280px; background: var(--bg-card); padding: 20px; border-radius: 18px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0 15px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button.add-btn { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }

        .alert-item { cursor: pointer; padding: 8px; border-radius: 8px; border-bottom: 1px solid #334155; margin-bottom: 4px; }
        .alert-label { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; margin-right: 8px; }
        .label-today { background: #f43f5e; color: white; }
        .label-overdue { background: #000000; color: #ff4d4d; border: 1px solid #ff4d4d; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <script>
        // パスワード認証スクリプト
        (function() {
            const password = "ippei";
            const input = prompt("パスワードを入力してください");

            if (input === password) {
                // 正解ならbodyを表示
                document.body.style.display = "block";
            } else {
                // 不正解ならメッセージを表示して処理を中断
                document.body.innerHTML = `
                    <div style="display:flex; justify-content:center; align-items:center; height:100vh; background:#0f172a; color:white; font-family:sans-serif;">
                        <h1 style="text-align:center;">アクセスできません</h1>
                    </div>`;
                document.body.style.display = "flex";
                throw new Error("Access Denied: Invalid Password");
            }
        })();
    </script>

    <div class="top-box">
        <div class="date-section">
            <div id="todayBox">日付を取得中...</div>
            <div class="link-group">
                <a href="https://www.hakodate-ct.ac.jp/" target="_blank" class="ext-link">函館工業高等専門学校</a>
                <a href="https://www.hakodate-ct.ac.jp/~w-ryou/index.html" target="_blank" class="ext-link">春潮寮</a>
                <a href="https://www.hakodate-ct.ac.jp/wp-content/uploads/2026/02/%E4%BB%A4%E5%92%8C%EF%BC%98%E5%B9%B4%E5%BA%A6%E5%B9%B4%E9%96%93%E8%A1%8C%E4%BA%8B%E4%BA%88%E5%AE%9A%E8%A1%A8%EF%BC%88%E5%AD%A6%E7%94%9F%E7%94%A8%EF%BC%89%E3%80%802026.01.29.pdf" target="_blank" class="ext-link">年間行事予定表</a>
                <a href="https://syllabus.kosen-k.go.jp/Pages/PublicSubjects?school_id=01&department_id=12&year=2026&lang=ja" target="_blank" class="ext-link">シラバス</a>
            </div>
        </div>
        
        <div class="deadline-area">
            <div class="deadline">
                <h3>直近の課題</h3>
                <div id="globalTaskAlert">なし</div>
            </div>
            <div class="deadline">
                <h3>直近のテスト</h3>
                <div id="globalTestAlert">なし</div>
            </div>
            <div class="deadline" style="cursor:default">
                <h3>メモ</h3>
                <textarea id="quickMemoInput" oninput="saveQuickMemo()"></textarea>
            </div>
        </div>
    </div>

    <div class="table-container">
        <table id="timetable">
            <thead>
                <tr id="headerRow">
                    <th style="width: 90px;"></th>
                    <th id="th-1"><span class="date-label" id="date-1"></span><span class="day-label">月</span></th>
                    <th id="th-2"><span class="date-label" id="date-2"></span><span class="day-label">火</span></th>
                    <th id="th-3"><span class="date-label" id="date-3"></span><span class="day-label">水</span></th>
                    <th id="th-4"><span class="date-label" id="date-4"></span><span class="day-label">木</span></th>
                    <th id="th-5"><span class="date-label" id="date-5"></span><span class="day-label">金</span></th>
                </tr>
            </thead>
            <tbody id="timetableBody"></tbody>
        </table>
    </div>

    <div id="popup" class="popup">
        <div class="popup-content">
            <span class="close" onclick="closePopup()">&times;</span>
            <h1 id="subjectTitle">教科名</h1>
            <div style="display:flex; gap:20px; flex-wrap:wrap; margin-bottom:30px;">
                <div class="input-box">
                    <h3>課題追加</h3>
                    <input type="text" id="taskTitle" placeholder="課題内容">
                    <input type="date" id="taskDeadline">
                    <textarea id="taskNote" placeholder="メモ"></textarea>
                    <button class="add-btn" onclick="addItem('task')" style="background:var(--accent); color:white;">課題を追加</button>
                </div>
                <div class="input-box">
                    <h3>テスト追加</h3>
                    <input type="text" id="testTitle" placeholder="テスト名">
                    <input type="date" id="testDate">
                    <textarea id="testNote" placeholder="メモ"></textarea>
                    <button class="add-btn" onclick="addItem('test')" style="background:var(--warning); color:white;">テストを追加</button>
                </div>
            </div>
            <div id="activeList"></div>
            <div class="completed-section">
                <h3>提出済み</h3>
                <div id="completedList"></div>
            </div>
        </div>
    </div>

    <div id="detailPopup" class="popup" style="z-index: 2000;">
        <div class="popup-content" style="max-width: 500px;">
            <span class="close" onclick="closeDetail()">&times;</span>
            <div id="detailView" style="background:var(--bg-card); padding:20px; border-radius:20px;"></div>
        </div>
    </div>
